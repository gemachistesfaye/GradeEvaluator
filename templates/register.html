{% extends "base.html" %}
{% block content %}

<div style="max-width: 400px; margin: 40px auto; text-align: center;">
    <div style="font-size: 48px; margin-bottom: 16px;"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12h20M12 2v20M5 9l7-7 7 7"/></svg></div>
    <h1 style="font-size: 28px; margin-bottom: 8px;">Create an Account</h1>
    <p style="color: var(--text-secondary); font-size: 14px; margin-bottom: 32px;">Start tracking your grades and get AI coaching.</p>

    <div class="card" style="text-align: left; padding: 32px;">
        <form method="POST">
            <div class="form-group">
                <label class="form-label">Full Name</label>
                <input type="text" name="name" placeholder="John Doe" required>
            </div>
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" name="email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" placeholder="Create a strong password" required>
            </div>
            <button type="submit" class="btn" style="width: 100%; margin-top: 8px; padding: 12px;">Sign Up</button>
        </form>
    </div>
    
    <p style="margin-top: 24px; font-size: 14px; color: var(--text-secondary);">
        Already have an account? <a href="{{ url_for('login') }}" style="font-weight: 600;">Sign in</a>
    </p>
</div>

{% endblock %}
