{% extends "base.html" %}
{% block content %}

<div style="max-width: 400px; margin: 40px auto; text-align: center;">
    <div style="font-size: 48px; margin-bottom: 16px;"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
    <h1 style="font-size: 28px; margin-bottom: 8px;">Welcome Back</h1>
    <p style="color: var(--text-secondary); font-size: 14px; margin-bottom: 32px;">Sign in to continue to GradeEvaluator.</p>

    <div class="card" style="text-align: left; padding: 32px;">
        <form method="POST">
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" name="email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn" style="width: 100%; margin-top: 8px; padding: 12px;">Sign In</button>
        </form>
    </div>
    
    <p style="margin-top: 24px; font-size: 14px; color: var(--text-secondary);">
        Don't have an account? <a href="{{ url_for('register') }}" style="font-weight: 600;">Sign up</a>
    </p>
</div>

{% endblock %}
